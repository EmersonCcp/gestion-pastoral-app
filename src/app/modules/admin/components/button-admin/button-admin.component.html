<button
  (click)="handleClick()"
  [disabled]="disabled"
  class="px-5 py-2.5 bg-primary-700 disabled:bg-primary-300 text-white rounded-lg text-sm  shadow-lg shadow-primary-700/20 hover:brightness-110 transition-all flex items-center gap-2"
>
  <span
    *ngIf="icon"
    class="material-symbols-outlined text-[18px]"
  >
    {{ icon }}
  </span>

  {{ label }}
</button>
