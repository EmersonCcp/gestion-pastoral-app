<div class="w-full ">
  <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
    {{ label }}
  </label>

  <input
    [formControl]="control!"
    [type]="type"
    [placeholder]="placeholder"
    class="w-full px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white
           focus:ring-2 focus:ring-primary-700/20 focus:border-primary 
           outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500"
  />
</div>
