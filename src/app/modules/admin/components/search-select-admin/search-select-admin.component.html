<div class="flex gap-2">
  <div class="dropdown w-full" [class.dropdown-open]="open">
    <label class="block text-sm font-semibold text-slate-700 mb-2">{{
      label
    }}</label>
    <div class="flex gap-3">
      <!-- Input -->
      <input
        type="text"
        class="w-full px-4 py-2 rounded-lg border border-slate-200 bg-white focus:ring-2 focus:ring-primary-700/20 focus:border-primary outline-none transition-all placeholder:text-slate-400"
        [placeholder]="placeholder"
        [value]="displayValue"
        (focus)="open = true"
        (input)="onSearch($event)"
      />

      <!-- Botón agregar -->
      <button
        *ngIf="showAdd"
        type="button"
        (click)="add.emit()"
        class="px-3 flex items-center border border-slate-300 rounded-lg hover:bg-slate-200 transition"
      >
        <span class="material-symbols-outlined text-sm">add</span>
      </button>
    </div>

    <!-- Lista -->
    <ul
      *ngIf="open"
      class="dropdown-content menu p-2 shadow bg-base-100 rounded-box w-full max-h-60 overflow-auto"
    >
      <li *ngFor="let item of filteredItems" (click)="select(item)">
        <a>{{ item[labelKey] | titlecase }}</a>
      </li>

      <li *ngIf="filteredItems.length === 0">
        <a class="text-gray-400">Sin resultados</a>
      </li>
    </ul>
  </div>
</div>
