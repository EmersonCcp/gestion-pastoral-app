<!-- Overlay Oscuro Móvil (se muestra solo en móviles cuando está abierto) -->
<div 
  *ngIf="isOpenMobile" 
  (click)="closeMobileSidebar()"
  class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 md:hidden transition-opacity duration-300">
</div>

<nav [ngClass]="[
    isCollapsed ? 'md:w-[80px]' : 'md:w-[250px]',
    isOpenMobile ? 'translate-x-0' : '-translate-x-full'
  ]"
  class="fixed md:relative inset-y-0 left-0 z-50 w-[260px] md:w-auto px-4 py-4 border-r-2 border-slate-200 dark:border-slate-700 h-screen md:h-auto flex flex-col transition-all duration-300 bg-white dark:bg-slate-900 md:translate-x-0">
  <!-- Top: Menu Icon -->
  <div class="flex items-center mb-6 justify-between" [ngClass]="isCollapsed ? 'md:justify-center' : 'md:justify-between'">
    <span *ngIf="!isCollapsed" class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-2">Menú</span>
    <button (click)="toggleSidebar()" class="hidden md:flex p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-slate-500 dark:text-slate-400 transition-colors items-center justify-center">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <button (click)="closeMobileSidebar()" class="flex md:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-slate-500 dark:text-slate-400 transition-colors items-center justify-center">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>

  <div class="space-y-2 flex-1 overflow-y-auto" style="scrollbar-width: thin; scrollbar-color: transparent transparent;">
    <a
      *ngFor="let item of filteredMenuItems"
      (click)="goTo(item.route)"
      class="flex items-center py-2 rounded-lg transition-colors cursor-pointer group hover:bg-primary-500 hover:text-white"
      [ngClass]="{
        'justify-center px-0': isCollapsed,
        'px-3 gap-3': !isCollapsed,
        'bg-primary-500 text-white shadow-md': isActive(item.route),
        'text-slate-600 dark:text-slate-300': !isActive(item.route)
      }"
      [attr.title]="isCollapsed ? item.label : null"
    >
      <span class="material-symbols-outlined text-xl">{{ item.icon }}</span>
      <span *ngIf="!isCollapsed" class="text-sm font-medium">{{ item.label }}</span>
    </a>
  </div>

</nav>
