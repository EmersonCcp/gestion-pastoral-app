<div class="p-8 max-w-5xl mx-auto animate-pulse">
  <!-- Header Skeleton -->
  <div class="flex items-center justify-between mb-10 pb-10 border-b border-slate-50 dark:border-slate-800">
    <div class="space-y-3">
      <div class="h-8 w-64 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
      <div class="h-4 w-96 bg-slate-100 dark:bg-slate-800 rounded-lg"></div>
    </div>
    <div class="flex gap-3">
      <div class="h-10 w-24 bg-slate-100 dark:bg-slate-800 rounded-xl"></div>
      <div class="h-10 w-36 bg-slate-200 dark:bg-slate-700 rounded-xl"></div>
    </div>
  </div>

  <!-- Form Container Skeleton -->
  <div class="bg-white dark:bg-slate-900 p-10 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm space-y-10">
    <!-- Section 1 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div *ngFor="let i of [1,2,3,4]" class="space-y-3">
        <div class="h-3 w-32 bg-slate-100 dark:bg-slate-800 rounded uppercase tracking-widest text-[9px]"></div>
        <div class="h-11 w-full bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-50 dark:border-slate-800"></div>
      </div>
    </div>

    <div class="h-px w-full bg-slate-50 dark:bg-slate-800"></div>

    <!-- Section 2 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div *ngFor="let i of [1,2,3]" class="space-y-3">
        <div class="h-3 w-24 bg-slate-100 dark:bg-slate-800 rounded uppercase tracking-widest text-[9px]"></div>
        <div class="h-11 w-full bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-50 dark:border-slate-800"></div>
      </div>
    </div>

    <!-- Wide Section -->
    <div class="space-y-3">
      <div class="h-3 w-40 bg-slate-100 dark:bg-slate-800 rounded uppercase tracking-widest text-[9px]"></div>
      <div class="h-32 w-full bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-50 dark:border-slate-800"></div>
    </div>
  </div>
</div>
