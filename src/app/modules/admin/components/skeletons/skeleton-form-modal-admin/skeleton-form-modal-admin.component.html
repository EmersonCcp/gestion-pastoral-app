<div class="bg-white flex flex-col gap-6 w-full max-w-[500px] h-full min-h-[300px] rounded-2xl p-8 animate-pulse">
  <!-- Title Placeholder -->
  <div class="space-y-2 mb-4">
    <div class="h-6 w-48 bg-slate-200 rounded-lg"></div>
    <div class="h-3 w-64 bg-slate-100 rounded-lg"></div>
  </div>

  <!-- Input Placeholder 1 -->
  <div class="flex flex-col gap-3">
    <div class="h-3 w-24 bg-slate-100 rounded tracking-widest text-[9px] uppercase"></div>
    <div class="h-11 w-full bg-slate-50 rounded-xl border border-slate-50"></div>
  </div>

  <!-- Grid Placeholder -->
  <div class="grid grid-cols-2 gap-4">
    <div *ngFor="let i of [1,2]" class="flex flex-col gap-3">
      <div class="h-3 w-20 bg-slate-100 rounded tracking-widest text-[9px] uppercase"></div>
      <div class="h-11 w-full bg-slate-50 rounded-xl border border-slate-50"></div>
    </div>
  </div>

  <!-- Select Placeholder -->
  <div class="flex flex-col gap-3">
    <div class="h-3 w-20 bg-slate-100 rounded tracking-widest text-[9px] uppercase"></div>
    <div class="h-11 w-full bg-slate-50 rounded-xl border border-slate-50"></div>
  </div>

  <!-- Buttons Placeholder -->
  <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-slate-50 w-full">
    <div class="h-10 w-24 bg-slate-100 rounded-xl"></div>
    <div class="h-10 w-32 bg-slate-200 rounded-xl"></div>
  </div>
</div>
