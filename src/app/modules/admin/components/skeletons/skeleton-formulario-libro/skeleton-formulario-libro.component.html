<div class="p-8 animate-pulse">
  <!-- Header -->
  <div class="flex flex-wrap justify-between items-end gap-4 mb-8">
    <div class="flex flex-col gap-2">
      <div class="h-8 w-64 bg-slate-200 dark:bg-slate-700 rounded"></div>
      <div class="h-4 w-80 bg-slate-200 dark:bg-slate-700 rounded"></div>
    </div>
    <div class="flex gap-3">
      <div class="h-10 w-28 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
      <div class="h-10 w-36 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- LEFT -->
    <div class="lg:col-span-2 space-y-8">
      <!-- Card -->
      <div class="bg-white dark:bg-slate-900 p-8 rounded-xl border border-slate-200 dark:border-slate-800 space-y-6">
        <div class="h-6 w-48 bg-slate-200 dark:bg-slate-700 rounded"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="md:col-span-2 h-10 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
          <div class="md:col-span-2 h-10 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
          <div class="col-span-2 h-10 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>

          <div class="h-10 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
          <div class="h-10 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>

          <div class="col-span-2 h-10 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>

          <div class="md:col-span-2 h-24 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
        </div>
      </div>

      <!-- Ejemplares -->
      <div class="bg-white dark:bg-slate-900 p-8 rounded-xl border border-slate-200 dark:border-slate-800 space-y-6">
        <div class="flex justify-between">
          <div class="h-6 w-56 bg-slate-200 dark:bg-slate-700 rounded"></div>
          <div class="h-6 w-32 bg-slate-200 dark:bg-slate-700 rounded"></div>
        </div>

        <!-- Item -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <div class="h-10 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
          <div class="h-10 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
          <div class="h-10 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
          <div class="h-10 bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
        </div>

        <!-- Empty -->
        <div class="h-32 bg-slate-100 dark:bg-slate-800 rounded-lg"></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="space-y-8">
      <!-- Imagen -->
      <div class="bg-white dark:bg-slate-900 p-8 rounded-xl border border-slate-200 dark:border-slate-800 space-y-6">
        <div class="h-6 w-40 bg-slate-200 dark:bg-slate-700 rounded"></div>

        <div class="aspect-[3/4] w-full bg-slate-200 dark:bg-slate-700 rounded-xl"></div>

        <div class="h-4 w-full bg-slate-200 dark:bg-slate-700 rounded"></div>
      </div>

      <!-- Helper -->
      <div class="p-6 rounded-xl border border-slate-200 dark:border-slate-800 space-y-3">
        <div class="h-4 w-40 bg-slate-200 dark:bg-slate-700 rounded"></div>
        <div class="h-3 w-full bg-slate-200 dark:bg-slate-700 rounded"></div>
        <div class="h-3 w-5/6 bg-slate-200 dark:bg-slate-700 rounded"></div>
      </div>
    </div>
  </div>

  <!-- Mobile buttons -->
  <div class="mt-12 lg:hidden flex flex-col gap-3">
    <div class="h-12 w-full bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
    <div class="h-12 w-full bg-slate-200 dark:bg-slate-700 rounded-lg"></div>
  </div>
</div>
