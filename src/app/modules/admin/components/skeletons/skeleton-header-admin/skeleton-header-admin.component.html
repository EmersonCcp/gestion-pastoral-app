<header
  class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 py-3 lg:px-10"
>
  <!-- Left: Logo + Title -->
  <div class="flex items-center gap-4">
    <!-- Logo skeleton -->
    <div class="size-10 bg-slate-200 dark:bg-slate-800 rounded-md animate-pulse"></div>

    <!-- Text skeleton -->
    <div class="flex flex-col gap-2">
      <div class="h-4 w-48 bg-slate-200 dark:bg-slate-800 rounded animate-pulse"></div>
      <div class="h-3 w-32 bg-slate-200 dark:bg-slate-800 rounded animate-pulse"></div>
    </div>
  </div>

  <!-- Right: Actions -->
  <div class="flex items-center gap-4">
    <!-- Buttons skeleton -->
    <div class="flex gap-2">
      <div class="h-10 w-10 bg-slate-200 dark:bg-slate-800 rounded-lg animate-pulse"></div>
      <div class="h-10 w-10 bg-slate-200 dark:bg-slate-800 rounded-lg animate-pulse"></div>
    </div>

    <div class="h-10 w-px bg-slate-200 dark:bg-slate-800 mx-2"></div>

    <!-- User skeleton -->
    <div class="flex items-center gap-3">
      <div class="hidden sm:flex flex-col items-end gap-2">
        <div class="h-3 w-28 bg-slate-200 dark:bg-slate-800 rounded animate-pulse"></div>
        <div class="h-2 w-20 bg-slate-200 dark:bg-slate-800 rounded animate-pulse"></div>
      </div>

      <div class="h-10 w-10 bg-slate-200 dark:bg-slate-800 rounded-full animate-pulse"></div>
    </div>
  </div>
</header>
