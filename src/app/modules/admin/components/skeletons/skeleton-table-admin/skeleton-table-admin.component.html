<div class="animate-pulse space-y-6">
  <!-- Search Input Placeholder -->
  <div class="h-10 w-full bg-slate-100 rounded-xl mb-6 border border-slate-50"></div>

  <!-- Table Placeholder -->
  <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
    <!-- Header -->
    <div class="bg-slate-50 h-10 border-b border-slate-100 flex items-center px-6 gap-4">
      <div *ngFor="let i of [1,2,3,4,5]" class="h-3 bg-slate-200 rounded w-full max-w-[120px]"></div>
    </div>

    <!-- Rows -->
    <div class="divide-y divide-slate-50">
      <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="p-6 flex items-center gap-6">
        <div class="h-4 w-8 bg-slate-100 rounded"></div>
        <div class="flex-1">
          <div class="h-4 w-48 bg-slate-100 rounded mb-2"></div>
          <div class="h-3 w-32 bg-slate-50 rounded"></div>
        </div>
        <div class="h-6 w-24 bg-slate-50 rounded-full"></div>
        <div class="h-4 w-32 bg-slate-50 rounded"></div>
        <div class="flex gap-2">
          <div class="h-8 w-8 bg-slate-50 rounded-full"></div>
          <div class="h-8 w-8 bg-slate-50 rounded-full"></div>
        </div>
      </div>
    </div>

    <!-- Pagination Footer -->
    <div class="p-4 border-t border-slate-50 bg-slate-50/30 flex justify-between items-center">
      <div class="h-3 w-40 bg-slate-100 rounded"></div>
      <div class="flex gap-2">
        <div class="h-8 w-24 bg-slate-100 rounded-lg"></div>
        <div class="h-8 w-24 bg-slate-100 rounded-lg"></div>
      </div>
    </div>
  </div>
</div>
