<!-- Main Container -->
<div class="flex flex-col gap-4 mb-6">
  <div class="flex items-center gap-2">
    <ng-content select="[header]"></ng-content>
  </div>

  <label *ngIf="showSearch"
    class="input w-full border border-slate-200 dark:border-slate-700 rounded-xl flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 shadow-sm focus-within:ring-2 focus-within:ring-primary-500/20 transition-all">
    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.3-4.3"></path>
      </g>
    </svg>
    <input type="text" (input)="handleSearch($event)" class="grow outline-none bg-transparent"
      [placeholder]="searchPlaceholder" />
  </label>
</div>

<!-- Table Container -->
<div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 overflow-hidden shadow-sm">
  <div class="overflow-x-auto w-full">
    <table class="w-full text-left border-collapse text-sm md:min-w-[800px] responsive-table">
      <thead class="bg-slate-50/50 dark:bg-slate-800/50 uppercase tracking-widest text-[10px] font-black text-slate-400 dark:text-slate-500">
        <ng-content select="[thead]"></ng-content>
      </thead>
      <tbody class="divide-y divide-slate-50 dark:divide-slate-800 transition-all duration-300">
        <!-- Skeleton rows only -->
        <ng-container *ngIf="loading">
          <tr>
            <td colspan="100%" class="p-0 border-none">
              <app-skeleton-table-admin [rowsOnly]="true"></app-skeleton-table-admin>
            </td>
          </tr>
        </ng-container>

        <!-- Actual Data -->
        <ng-container *ngIf="!loading">
          <ng-content select="[tbody]"></ng-content>
        </ng-container>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div *ngIf="showPagination"
    class="px-6 py-4 border-t border-slate-50 dark:border-slate-800 bg-slate-50/20 dark:bg-slate-800/20 flex flex-wrap items-center justify-between gap-4">
    <span class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest leading-none">
      Mostrando <span class="text-slate-700 dark:text-slate-300">{{ itemsLength }}</span> de <span class="text-slate-700 dark:text-slate-300">{{ totalItems
        }}</span> {{ entityName }}
    </span>
    <div class="flex gap-2">
      <app-button-admin label="Anterior" icon="chevron_left" (onClick)="prevPage()"></app-button-admin>
      <app-button-admin label="Siguiente" icon="chevron_right" (onClick)="nextPage()"></app-button-admin>
    </div>
  </div>
</div>
