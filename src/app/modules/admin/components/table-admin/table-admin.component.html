<app-skeleton-table-admin *ngIf="loading"></app-skeleton-table-admin>

<div *ngIf="!loading">
  <!-- Header (Filters) and Search -->
  <div class="flex flex-col gap-4 mb-6">
    <div class="flex items-center gap-2">
      <ng-content select="[header]"></ng-content>
    </div>

    <label *ngIf="showSearch"
      class="input w-full border border-slate-200 rounded-xl flex items-center gap-2 px-4 py-2 bg-white text-slate-700 shadow-sm focus-within:ring-2 focus-within:ring-primary-500/20 transition-all">
      <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </g>
      </svg>
      <input type="text" (input)="handleSearch($event)" class="grow outline-none bg-transparent"
        [placeholder]="searchPlaceholder" />
    </label>
  </div>

  <!-- Contenedor de la Tabla -->
  <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
    <div class="overflow-x-auto w-full">
      <table class="w-full text-left border-collapse text-sm md:min-w-[800px] responsive-table">
        <thead class="bg-slate-50/50 uppercase tracking-widest text-[10px] font-black text-slate-400">
          <ng-content select="[thead]"></ng-content>
        </thead>
        <tbody class="divide-y divide-slate-50">
          <ng-content select="[tbody]"></ng-content>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div *ngIf="showPagination"
      class="px-6 py-4 border-t border-slate-50 bg-slate-50/20 flex flex-wrap items-center justify-between gap-4">
      <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">
        Mostrando <span class="text-slate-700">{{ itemsLength }}</span> de <span class="text-slate-700">{{ totalItems
          }}</span> {{ entityName }}
      </span>
      <div class="flex gap-2">
        <app-button-admin label="Anterior" icon="chevron_left" (onClick)="prevPage()"></app-button-admin>
        <app-button-admin label="Siguiente" icon="chevron_right" (onClick)="nextPage()"></app-button-admin>
      </div>
    </div>
  </div>
</div>
