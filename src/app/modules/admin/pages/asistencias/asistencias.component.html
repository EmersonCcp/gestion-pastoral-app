<div class="p-8 max-w-6xl mx-auto">
  <app-list-header-admin
    title="Asistencias"
    subtitle="Registra y consulta la asistencia de los grupos por período."
    buttonLabel="Nueva Asistencia"
    buttonIcon="event_available"
    (buttonClick)="nueva()"
  ></app-list-header-admin>

  <!-- Filters -->
  <div class="flex flex-wrap items-center gap-4 mt-6 mb-4">
    <div class="flex flex-col gap-1">
      <label class="text-xs font-bold text-slate-500 uppercase">Período</label>
      <select class="select select-sm border border-slate-200 rounded-lg text-sm" [(ngModel)]="selectedPeriodoId" (change)="onFilterChange()">
        <option [ngValue]="null">Todos los períodos</option>
        <option *ngFor="let p of periodos" [ngValue]="p.id">{{ p.nombre }}</option>
      </select>
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-xs font-bold text-slate-500 uppercase">Grupo</label>
      <select class="select select-sm border border-slate-200 rounded-lg text-sm" [(ngModel)]="selectedGrupoId" (change)="onFilterChange()">
        <option [ngValue]="null">Todos los grupos</option>
        <option *ngFor="let g of grupos" [ngValue]="g.id">{{ g.nombre }}</option>
      </select>
    </div>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-slate-50 border-b border-slate-200">
          <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Fecha</th>
          <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Grupo</th>
          <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Período</th>
          <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">Resumen</th>
          <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Observación</th>
          <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let a of asistencias" class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
          <td class="px-6 py-4 text-sm font-bold text-slate-700">
            {{ a.fecha | date: 'dd/MM/yyyy' }}
          </td>
          <td class="px-6 py-4 text-sm text-slate-600">
            {{ a.grupo?.nombre }}
          </td>
          <td class="px-6 py-4 text-sm text-slate-500">
            {{ a.periodo?.nombre }}
          </td>
          <td class="px-6 py-4">
            <div class="flex items-center justify-center gap-2">
              <span class="px-2 py-0.5 bg-green-50 text-green-700 rounded-full text-[10px] font-black border border-green-100" title="Presentes">
                P: {{ a.total_presente }}
              </span>
              <span class="px-2 py-0.5 bg-red-50 text-red-700 rounded-full text-[10px] font-black border border-red-100" title="Ausentes">
                A: {{ a.total_ausente }}
              </span>
              <span class="px-2 py-0.5 bg-yellow-50 text-yellow-700 rounded-full text-[10px] font-black border border-yellow-100" title="Justificados">
                J: {{ a.total_justificado }}
              </span>
            </div>
          </td>
          <td class="px-6 py-4 text-sm text-slate-400 italic">
            {{ a.observacion || '—' }}
          </td>
          <td class="px-6 py-4 text-right">
            <div class="flex justify-end gap-2">
              <button (click)="editar(a)" class="p-2 text-slate-400 hover:text-primary-600 hover:bg-primary-50 rounded-lg transition-colors">
                <span class="material-symbols-outlined text-[20px]">edit</span>
              </button>
              <button (click)="eliminar(a)" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                <span class="material-symbols-outlined text-[20px]">delete</span>
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="asistencias.length === 0 && !loading">
          <td colspan="5" class="px-6 py-16 text-center">
            <div class="flex flex-col items-center gap-2 text-slate-400">
              <span class="material-symbols-outlined text-[48px]">event_busy</span>
              <p class="font-medium">No hay registros de asistencia.</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
