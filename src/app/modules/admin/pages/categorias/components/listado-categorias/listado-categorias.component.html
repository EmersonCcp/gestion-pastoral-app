<app-table-admin
  [loading]="loading"
  searchPlaceholder="Buscar por nombre.."
  [itemsLength]="categorias.length"
  [totalItems]="total_items"
  entityName="categorias"
  (search)="onSearchChange($event)"
  (prev)="prevPage()"
  (next)="nextPage()"
>
  <tr thead class="bg-slate-50  border-b border-slate-200">
    <th class="px-6 py-2 text-xs font-bold text-slate-500 uppercase tracking-wider">N°</th>
    <th class="px-6 py-2 text-xs font-bold text-slate-500 uppercase tracking-wider">Nombre</th>
    <th class="px-6 py-2 text-xs font-bold text-slate-500 uppercase tracking-wider">Estado</th>
    <th class="px-6 py-2 text-xs font-bold text-slate-500 uppercase tracking-wider">Libros asociados</th>
    <th class="px-6 py-2 text-xs font-bold text-slate-500 uppercase tracking-wider">Acciones</th>
  </tr>

  <ng-container tbody>
    <tr *ngFor="let categoria of categorias; let i = index" class="hover:bg-slate-50 transition-colors">
      <td class="px-6 py-2">
        <div class="inline-flex items-center px-2.5 py-1 rounded-md text-xs">
          {{ (page - 1) * per_page + i + 1 }}
        </div>
      </td>
      <td class="px-6 py-2">
        <div class="flex items-center gap-3">
          <span class="text-slate-900">{{ categoria.nombre | uppercase }}</span>
        </div>
      </td>
      <td class="px-6 py-2 text-sm">
        <span class="rounded-md p-0.5 text-white" [ngClass]="{'bg-primary-500': categoria.estado, 'bg-red-400': categoria.estado === false}">
          {{ categoria.estado ? 'ACTIVO' : 'INACTIVO' }}
        </span>
      </td>
      <td class="px-6 py-2 text-sm text-center">
        <div class="inline-flex items-center px-4 py-1.5 rounded-full bg-primary-50 text-primary-700 text-xs font-bold border border-primary-100 shadow-sm">
          <span class="material-symbols-outlined text-[14px] mr-1.5 opacity-70">book_2</span>
          {{ categoria.total_libros || 0 }}
        </div>
      </td>
      <td class="px-6 py-2">
        <div class="flex items-center gap-2">
          <button *appHasPermission="'categorias.update'" (click)="editCategoria(categoria)" class="p-1.5 text-slate-400 hover:text-primary-700 hover:bg-primary-100 rounded-full transition-colors">
            <span class="material-symbols-outlined text-[20px]">edit</span>
          </button>
          <button *appHasPermission="'categorias.delete'" (click)="removeCategoria(categoria)" class="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-100 rounded-full transition-colors">
            <span class="material-symbols-outlined text-[20px]">delete</span>
          </button>
        </div>
      </td>
    </tr>
  </ng-container>
</app-table-admin>

<app-formulario-categoria (saved)="refresh()" [categoria]="categoria" (cerrar)="cerrarModal()" *ngIf="mostrarFormulario"></app-formulario-categoria>
