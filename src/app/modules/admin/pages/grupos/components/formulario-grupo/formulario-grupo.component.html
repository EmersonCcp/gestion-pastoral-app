<app-skeleton-form-admin *ngIf="loading"></app-skeleton-form-admin>

<div *ngIf="!loading" class="p-8 max-w-5xl mx-auto">
  <div class="flex flex-wrap items-center justify-between gap-6 mb-10 pb-10 border-b border-slate-50">
    <div class="flex flex-col gap-1">
      <h2 class="text-3xl font-black text-slate-900 tracking-tight">
        Gestión de Grupos
      </h2>
      <p class="text-slate-500 font-medium">{{ editMode ? 'Edita los detalles del grupo o subgrupo' : 'Agrega un nuevo
        grupo al sistema' }}</p>
    </div>
    <div class="flex gap-3">
      <button (click)="goBack()"
        class="px-5 py-2.5 border border-slate-300 rounded-lg text-slate-700 text-sm font-bold hover:bg-slate-50 transition-all">
        Cancelar
      </button>

      <app-button-admin *ngIf="!disabled" (onClick)="onSubmit()" icon="save" label="Guardar Grupo"></app-button-admin>
    </div>
  </div>

  <form [formGroup]="form" class="space-y-8 bg-white p-10 rounded-3xl border border-slate-100 shadow-sm">
    <div class="col-span-full">
      <app-form-input-admin label="Nombre del Grupo*" placeholder="Ej. Confirmación 1, Comisión A, etc."
        [control]="nombreControl"></app-form-input-admin>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 border-t border-slate-50 pt-8">
      <!-- Selector de Grupo Padre (Subgrupos) -->
      <div class="flex cursor-pointer flex-col items-start gap-3 w-full">
        <label class="block text-sm font-semibold text-slate-700">
          Grupo Padre (Opcional)
        </label>
        <select formControlName="parent_id" (change)="onParentChange()"
          class="w-full select px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-sm">
          <option [value]="null">NINGUNO (Grupo Principal)</option>
          <option *ngFor="let g of gruposPadre" [value]="g.id">{{ g.nombre }}</option>
        </select>
      </div>

      <!-- Selector de Movimiento -->
      <div class="flex cursor-pointer flex-col items-start gap-3 w-full">
        <label class="block text-sm font-semibold text-slate-700">
          Movimiento*
        </label>
        <select formControlName="movimiento_id"
          class="w-full select px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-sm">
          <option [value]="null" disabled>Selecciona un movimiento</option>
          <option *ngFor="let m of movimientos" [value]="m.id">{{ m.nombre }}</option>
        </select>
      </div>
    </div>

    <div class="flex items-center gap-3 py-2">
      <input type="checkbox" formControlName="estado"
        class="w-5 h-5 rounded border-slate-300 text-primary-600 focus:ring-primary-500" />
      <label class="text-sm font-semibold text-slate-700">
        Grupo Activo
      </label>
    </div>

    <div class="col-span-full pt-4 border-t border-slate-50">
      <label class="block text-sm font-semibold text-slate-700 mb-3">
        Descripción
      </label>
      <textarea formControlName="descripcion" rows="4"
        class="w-full px-4 py-2 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-sm"
        placeholder="Detalles sobre el objetivo del grupo..."></textarea>
    </div>
  </form>
</div>
