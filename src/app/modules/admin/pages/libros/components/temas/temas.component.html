<div>
  <div class="flex items-center justify-between mb-4">
    <h3 class="font-bold text-slate-800 flex items-center gap-2">
      <span class="material-symbols-outlined text-primary-500">format_list_numbered</span>
      Temas del Libro
    </h3>
    <button *ngIf="!showForm" (click)="nuevo()" class="text-xs font-bold text-primary-600 hover:text-primary-700 flex items-center gap-1 transition-colors">
      <span class="material-symbols-outlined text-sm">add_circle</span>
      Agregar Tema
    </button>
  </div>

  <!-- Inline Form -->
  <div *ngIf="showForm" class="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6 animate-in fade-in zoom-in duration-200">
    <form [formGroup]="form" (ngSubmit)="guardar()" class="space-y-3">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
        <div class="md:col-span-1">
          <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Orden</label>
          <input type="number" formControlName="numero_tema" class="w-full px-3 py-1.5 border border-slate-200 rounded focus:outline-none focus:border-primary-500 text-sm">
        </div>
        <div class="md:col-span-3">
          <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Título del Tema</label>
          <input type="text" formControlName="titulo" placeholder="Ej: Introducción a la fe" class="w-full px-3 py-1.5 border border-slate-200 rounded focus:outline-none focus:border-primary-500 text-sm">
        </div>
      </div>
      <div>
        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Descripción corta</label>
        <textarea formControlName="descripcion" rows="2" class="w-full px-3 py-1.5 border border-slate-200 rounded focus:outline-none focus:border-primary-500 text-sm" placeholder="Resumen del tema..."></textarea>
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <button type="button" (click)="showForm = false" class="px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-200 rounded transition-colors">Cancelar</button>
        <button type="submit" [disabled]="form.invalid || loading" class="px-3 py-1.5 text-xs font-medium text-white bg-primary-600 hover:bg-primary-700 rounded transition-colors shadow-sm">
          {{ editingId ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>

  <!-- Topics List -->
  <div class="space-y-2">
    <div *ngIf="temas.length === 0 && !loading" class="text-center py-8 border-2 border-dashed border-slate-100 rounded-xl">
      <span class="material-symbols-outlined text-slate-200 text-4xl mb-2">auto_stories</span>
      <p class="text-slate-400 text-sm italic">No hay temas registrados aún.</p>
    </div>

    <div *ngFor="let t of temas" class="group flex items-start gap-3 p-3 bg-white border border-slate-100 hover:border-primary-200 hover:shadow-md rounded-xl transition-all">
      <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-500 group-hover:bg-primary-100 group-hover:text-primary-600 shrink-0 transition-colors">
        {{ t.numero_tema }}
      </div>
      <div class="flex-1 min-w-0">
        <h4 class="text-sm font-semibold text-slate-800 group-hover:text-primary-700 transition-colors">{{ t.titulo }}</h4>
        <p class="text-xs text-slate-500 line-clamp-2">{{ t.descripcion }}</p>
      </div>
      <div class="flex items-center gap-1 group-hover:opacity-100 transition-opacity">
        <button (click)="editar(t)" class="p-1.5 text-slate-400 hover:text-primary-600 hover:bg-primary-50 rounded-lg transition-colors" title="Editar">
          <span class="material-symbols-outlined text-[18px]">edit</span>
        </button>
        <button (click)="eliminar(t)" class="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Eliminar">
          <span class="material-symbols-outlined text-[18px]">delete</span>
        </button>
      </div>
    </div>
  </div>
</div>
