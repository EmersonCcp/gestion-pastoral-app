<div class="p-8">
  <div class="flex flex-wrap justify-between items-end gap-4 mb-8">
    <div class="flex flex-col gap-1">
      <h2 class="text-3xl font-black text-slate-900 tracking-tight">
        Gestión de Movimientos
      </h2>
      <p class="text-slate-500 font-medium">{{ editMode ? 'Edita los detalles del movimiento' : 'Agrega un nuevo movimiento al sistema' }}</p>
    </div>
    <div class="flex gap-3">
      <button
        (click)="goBack()"
        class="px-5 py-2.5 border border-slate-300 rounded-lg text-slate-700 text-sm font-bold hover:bg-slate-50 transition-all"
      >
        Cancelar
      </button>

      <app-button-admin
        *ngIf="!disabled"
        (onClick)="onSubmit()"
        icon="save"
        label="Guardar Movimiento"
      ></app-button-admin>
    </div>
  </div>

  <form [formGroup]="form" class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white p-8 rounded-xl border border-slate-100 shadow-sm">
    <div class="col-span-full">
      <app-form-input-admin
        label="Nombre del Movimiento*"
        placeholder="Ej. Catequesis, Confirmación, etc."
        [control]="nombreControl"
      ></app-form-input-admin>
    </div>

    <!-- Selector de Parroquia -->
    <div class="flex flex-col items-start gap-3 w-full">
      <label class="block text-sm font-semibold text-slate-700">
        Parroquia (Opcional)
      </label>
      <select
        formControlName="parroquia_id"
        class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-sm"
      >
        <option [value]="null">NINGUNA (Independiente)</option>
        <option *ngFor="let p of parroquias" [value]="p.id">{{ p.nombre }}</option>
      </select>
    </div>

    <div class="flex flex-col items-start gap-3 mt-6">
      <label class="block text-sm font-semibold text-slate-700 mb-1">
        Estado Activo
      </label>
      <input type="checkbox" formControlName="estado" 
             class="w-5 h-5 rounded border-slate-300 text-primary-600 focus:ring-primary-500" />
    </div>

    <div class="col-span-full">
      <label class="block text-sm font-semibold text-slate-700 mb-2">
        Descripción
      </label>
      <textarea
        formControlName="descripcion"
        rows="4"
        class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-sm"
        placeholder="Información sobre el movimiento..."
      ></textarea>
    </div>
  </form>
</div>
