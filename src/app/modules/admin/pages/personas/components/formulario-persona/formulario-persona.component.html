<app-skeleton-form-admin *ngIf="loading"></app-skeleton-form-admin>

<div *ngIf="!loading" class="p-8 max-w-5xl mx-auto">
  <div class="flex flex-wrap items-center justify-between gap-6 mb-10 pb-10 border-b border-slate-50 dark:border-slate-800">
    <div class="flex flex-col gap-1">
      <h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight">
        Ficha de Persona
      </h2>
      <p class="text-slate-500 dark:text-slate-400 font-medium">{{ editMode ? 'Actualiza la información del miembro' : 'Registra una nueva
        persona en la base de datos' }}</p>
    </div>
    <div class="flex gap-3">
      <button (click)="goBack()"
        class="px-5 py-2.5 border border-slate-300 dark:border-slate-700 rounded-lg text-slate-700 dark:text-slate-300 text-sm font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
        Cancelar
      </button>

      <app-button-admin *ngIf="!disabled" (onClick)="onSubmit()" icon="save"
        label="Guardar Registro"></app-button-admin>
    </div>
  </div>

  <form [formGroup]="form" class="space-y-8 bg-white dark:bg-slate-900 p-10 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm transition-colors">

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <app-form-input-admin label="Nombre*" placeholder="Ej: Juan" [control]="nombreControl"></app-form-input-admin>
      <app-form-input-admin label="Apellido*" placeholder="Ej: Pérez"
        [control]="apellidoControl"></app-form-input-admin>
      <app-form-input-admin label="Documento" placeholder="DNI / Cédula"
        [control]="documentoControl"></app-form-input-admin>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-slate-50 dark:border-slate-800">
      <div class="flex flex-col items-start gap-3 w-full">
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Tipo de Persona*</label>
        <select formControlName="tipo_persona_id"
          class="select w-full px-4 py-2 border border-slate-200 dark:border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-sm bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100">
          <option [value]="null" disabled>Selecciona una categoría</option>
          <option *ngFor="let t of tipos" [value]="t.id">{{ t.nombre }}</option>
        </select>
      </div>

      <app-form-input-admin label="Correo Electrónico" placeholder="ejemplo@correo.com"
        [control]="emailControl"></app-form-input-admin>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col items-start gap-3 w-full">
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Género</label>
        <select formControlName="genero"
          class="select w-full px-4 py-2 border border-slate-200 dark:border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-sm bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100">
          <option value="">Selecciona género</option>
          <option value="MASCULINO">Masculino</option>
          <option value="FEMENINO">Femenino</option>
          <option value="OTRO">Otro</option>
        </select>
      </div>

      <app-form-input-admin label="Fecha de Nacimiento" type="date"
        [control]="fechaNacimientoControl"></app-form-input-admin>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <app-form-input-admin label="Teléfono / Celular" placeholder="+54..."
        [control]="telefonoControl"></app-form-input-admin>
      <app-form-input-admin label="Dirección" placeholder="Calle, Nro, Ciudad"
        [control]="direccionControl"></app-form-input-admin>
    </div>

  </form>
</div>
