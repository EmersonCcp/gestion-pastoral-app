<app-table-admin [loading]="loading" searchPlaceholder="Buscar por nombre, apellido o documento..."
  [itemsLength]="personas.length" [totalItems]="total_items" entityName="personas" (search)="onSearchChange($event)"
  (prev)="prevPage()" (next)="nextPage()">
  <div header class="flex items-center gap-2 px-3 rounded-md bg-white dark:bg-slate-800 cursor-pointer ">
    <button (click)="importarCSV()"
      class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-green-600 hover:bg-green-700 text-white text-xs font-bold transition-all shadow-sm hover:shadow-md uppercase tracking-wider">
      <span class="material-symbols-outlined text-[16px]">upload_file</span>
      <span>Importar CSV</span>
    </button>

    <select
      class="select select-bordered bg-white dark:bg-slate-800 select-sm rounded-lg border-slate-200 dark:border-slate-700 text-[11px] font-bold text-slate-500 dark:text-slate-400 bg-slate-50/50 dark:bg-slate-800/50 uppercase tracking-wider"
      [(ngModel)]="tipoPersonaSelected" (change)="page = 1; loadData()">
      <option [ngValue]="null">Todos los tipos</option>
      <option *ngFor="let t of tiposPersonas" [ngValue]="t.id">{{ t.nombre }}</option>
    </select>
  </div>

  <tr thead class="bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
    <th class="px-6 py-2 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-left">N°</th>
    <th class="px-6 py-2 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-left">Nombre Completo</th>
    <th class="px-6 py-2 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-left">Tipo</th>
    <th class="px-6 py-2 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-left">Contacto</th>
    <th class="px-6 py-2 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-left">Acciones</th>
  </tr>

  <ng-container tbody>
    <tr *ngFor="let p of personas; let i = index" class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors border-b border-slate-50 dark:border-slate-800/50">
      <td class="px-6 py-2">
        <div class="inline-flex items-center px-2.5 py-1 rounded-md text-xs text-slate-600 dark:text-slate-400 bg-slate-100 dark:bg-slate-800">
          {{ (page - 1) * per_page + i + 1 }}
        </div>
      </td>
      <td class="px-6 py-2">
        <div class="flex flex-col">
          <div class="flex items-center gap-2">
            <span class="text-slate-900 dark:text-slate-100 text-sm font-medium">{{ p.nombre }} {{ p.apellido }}</span>
            <div class="flex items-center gap-0.5">
              <span *ngIf="p.bautismo" class="material-symbols-outlined text-[14px] text-blue-500" title="Bautizado">water_drop</span>
              <span *ngIf="p.primera_comunion" class="material-symbols-outlined text-[14px] text-amber-500" title="Primera Comunión">restaurant</span>
              <span *ngIf="p.confirmacion" class="material-symbols-outlined text-[14px] text-rose-500" title="Confirmado">auto_awesome</span>
            </div>
          </div>
        </div>
      </td>
      <td class="px-6 py-2">
        <div class="flex flex-wrap gap-1">
          <span *ngFor="let t of p.tiposPersonas"
            class="inline-flex items-center px-2 py-0.5 rounded bg-indigo-50 dark:bg-indigo-900/30 text-[10px] font-bold text-indigo-700 dark:text-indigo-300 border border-indigo-100 dark:border-indigo-800/50 uppercase">
            {{ t.nombre }}
          </span>
          <span *ngIf="!p.tiposPersonas || p.tiposPersonas.length === 0" class="text-[10px] text-slate-400 italic">S/T</span>
        </div>
      </td>
      <td class="px-6 py-2">
        <div class="flex flex-col gap-0.5">
          <span class="text-[11px] text-slate-500 dark:text-slate-400 flex items-center gap-1" *ngIf="p.email">
            <span class="material-symbols-outlined text-[14px]">mail</span> {{ p.email }}
          </span>
          <span class="text-[11px] text-slate-500 dark:text-slate-400 flex items-center gap-1" *ngIf="p.telefono">
            <span class="material-symbols-outlined text-[14px]">call</span> {{ p.telefono }}
          </span>
        </div>
      </td>
      <td class="px-6 py-2">
        <div class="flex items-center gap-2">
          <button (click)="verPerfil(p)"
            class="p-1.5 text-slate-400 hover:text-green-600 dark:hover:text-green-400 hover:bg-green-100 dark:hover:bg-green-900/30 rounded-full transition-colors"
            title="Ver Perfil">
            <span class="material-symbols-outlined text-[20px]">account_circle</span>
          </button>
          <button *appHasPermission="'personas.update'" (click)="editar(p)"
            class="p-1.5 text-slate-400 hover:text-primary-700 dark:hover:text-primary-400 hover:bg-primary-100 dark:hover:bg-primary-900/30 rounded-full transition-colors"
            title="Editar">
            <span class="material-symbols-outlined text-[20px]">edit</span>
          </button>
          <button *appHasPermission="'personas.delete'" (click)="eliminar(p)"
            class="p-1.5 text-slate-400 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-full transition-colors"
            title="Eliminar">
            <span class="material-symbols-outlined text-[20px]">delete</span>
          </button>
        </div>
      </td>
    </tr>
  </ng-container>
</app-table-admin>
