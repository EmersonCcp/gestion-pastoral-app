<div class="p-8 max-w-4xl mx-auto">
  <app-list-header-admin
    title="Tipos de Personas"
    subtitle="Gestiona las categorías de miembros (Ej: Alumnos, Catequistas, Padres)."
    buttonLabel="Nuevo Tipo"
    buttonIcon="add"
    (buttonClick)="agregar()"
  ></app-list-header-admin>

  <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden mt-6">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-slate-50 border-b border-slate-200">
          <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Nombre</th>
          <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Descripción</th>
          <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of tipos" class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
          <td class="px-6 py-4 font-bold text-slate-800">{{ t.nombre }}</td>
          <td class="px-6 py-4 text-sm text-slate-500">{{ t.descripcion || '-' }}</td>
          <td class="px-6 py-4 text-right">
            <div class="flex justify-end gap-2">
              <button (click)="editar(t)" class="p-2 text-slate-400 hover:text-primary-600 hover:bg-primary-50 rounded-lg transition-colors">
                <span class="material-symbols-outlined text-[20px]">edit</span>
              </button>
              <button (click)="eliminar(t)" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                <span class="material-symbols-outlined text-[20px]">delete</span>
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="tipos.length === 0 && !loading">
          <td colspan="3" class="px-6 py-12 text-center text-slate-400 font-medium italic">
            No hay tipos de personas registrados.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
