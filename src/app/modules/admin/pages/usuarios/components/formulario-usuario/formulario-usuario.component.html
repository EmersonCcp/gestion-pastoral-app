<div class="p-8">
  <div class="flex flex-wrap justify-between items-end gap-4 mb-8">
    <div class="flex flex-col gap-1">
      <h2 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight transition-colors">
        Gestión de Usuarios
      </h2>
      <p class="text-slate-500 dark:text-slate-400 font-medium transition-colors">Agrega o edita un usuario</p>
    </div>
    <div class="flex gap-3">
      <button
        (click)="goBack()"
        class="px-5 py-2.5 border border-slate-300 dark:border-slate-700 rounded-lg text-slate-700 dark:text-slate-300 text-sm font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all"
      >
        Cancelar
      </button>

      <app-button-admin
        (onClick)="onSubmit()"
        icon="save"
        label="Guardar Usuario"
      ></app-button-admin>
    </div>
  </div>

  <form [formGroup]="form" class="flex flex-col gap-6">
    <app-form-input-admin
      label="Nombre Completo*"
      placeholder="Ej. Juan Perez"
      [control]="nombreControl"
    ></app-form-input-admin>

    <app-form-input-admin
      label="Email*"
      placeholder="Ej. juan@correo.com"
      [control]="emailControl"
    ></app-form-input-admin>

    <app-form-input-admin
      *ngIf="!editMode"
      label="Contraseña*"
      placeholder="********"
      [control]="passwordControl"
      type="text"
    ></app-form-input-admin>

    <!-- Rol Inicial -->
    <div class="flex flex-col items-start gap-3 w-full">
      <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">
        Rol Inicial*
      </label>
      <select
        formControlName="rol_id"
        class="p-2 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 rounded-md w-full transition-colors focus:ring-2 focus:ring-primary-500/20 outline-none"
      >
        <option [value]="null">Seleccione un Rol</option>
        <option *ngFor="let r of roles" [value]="r.id">{{ r.nombre }}</option>
      </select>
    </div>

    <!-- Parroquia -->
    <div 
      class="flex flex-col items-start gap-3 w-full" 
      *ngIf="!form.get('is_super_user')?.value"
    >
      <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">
        Parroquia*
      </label>
      <select
        formControlName="parroquia_id"
        class="p-2 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 rounded-md w-full transition-colors focus:ring-2 focus:ring-primary-500/20 outline-none"
      >
        <option [value]="null">Seleccione una Parroquia</option>
        <option *ngFor="let p of parroquias" [value]="p.id">{{ p.nombre }}</option>
      </select>
    </div>

    <!-- Movimientos con acceso -->
    <div class="flex flex-col gap-3 w-full">
      <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">
        Movimientos con acceso
      </label>
      <p class="text-xs text-slate-500 dark:text-slate-400 -mt-1 transition-colors">
        Seleccioná los movimientos a los que este usuario podrá acceder
      </p>

      <div *ngIf="movimientos.length === 0" class="text-sm text-slate-400 dark:text-slate-600 italic transition-colors">
        No hay movimientos disponibles.
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        <div
          *ngFor="let m of movimientos"
          (click)="toggleMovimiento(m.id)"
          [ngClass]="{
            'border-primary-600 bg-primary-50 dark:bg-primary-900/20 text-primary-800 dark:text-primary-300': isMovimientoSelected(m.id),
            'border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-400 hover:border-slate-300 dark:hover:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800': !isMovimientoSelected(m.id)
          }"
          class="flex items-center gap-3 p-4 rounded-xl border-2 cursor-pointer transition-all select-none"
        >
          <div
            [ngClass]="{
              'bg-primary-600 border-primary-600': isMovimientoSelected(m.id),
              'bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600': !isMovimientoSelected(m.id)
            }"
            class="w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 transition-all"
          >
            <span
              *ngIf="isMovimientoSelected(m.id)"
              class="material-symbols-outlined text-white text-sm"
              style="font-size: 14px;"
            >check</span>
          </div>
          <div class="flex flex-col min-w-0">
            <span class="font-semibold text-sm truncate">{{ m.nombre }}</span>
            <span *ngIf="m.descripcion" class="text-xs text-slate-500 dark:text-slate-500 truncate">{{ m.descripcion }}</span>
          </div>
        </div>
      </div>

      <!-- Badge con conteo seleccionados -->
      <div *ngIf="(form.get('movimiento_ids')?.value?.length || 0) > 0"
        class="text-xs font-semibold text-primary-700 dark:text-primary-400 bg-primary-50 dark:bg-primary-900/20 px-3 py-1.5 rounded-full w-fit border border-primary-100 dark:border-primary-800/50 transition-colors">
        {{ form.get('movimiento_ids')?.value?.length }} movimiento(s) seleccionado(s)
      </div>
    </div>

    <div class="flex flex-col items-start gap-3">
      <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
        Es Super Usuario
      </label>
      <input class="ml-3 dark:bg-slate-800 dark:border-slate-700" type="checkbox" formControlName="is_super_user" />
    </div>

    <div class="flex flex-col items-start gap-3">
      <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
        Estado Activo
      </label>
      <input class="ml-3 dark:bg-slate-800 dark:border-slate-700" type="checkbox" formControlName="estado" />
    </div>
  </form>
</div>
